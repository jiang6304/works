<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

    <title>登录注册</title>
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div class="container">
        
        <div class="form-box" style="transform: translateX(80%);">
            <!-- 登录 -->
            <form action="login.php" method="post">
                <div class="login-box hidden">
                    <h1>login</h1>
                    <input type="text" name="uid" placeholder="账号">
                    <input type="password" name="passwd" placeholder="密码">
                    <button type="submit">登录</button>
                </div>
            </form>
            <!-- 注册 -->
            <form action="regi.php" method="post">   
                <div class="register-box ">
                    <h1>register</h1>
                    <input type="number" name="uid" placeholder="账号">
                    <input type="text" name="username" placeholder="用户名">
                    <input  name="tell" placeholder="手机号">
                    <input type="password" name="passwd" placeholder="请输入密码">
                    <input type="password" name="repasswd" placeholder="确认密码">
                    <button type="submit">注册</button>
                </div>
            </form>
        </div>
        <div class="con-box left">
            <h2>欢迎来到<span>闲云野鹤</span></h2>
            <p>快来开启<span>手工之旅</span>吧</p>
            <img src="img/登录1.png" alt="">
            <p>已有账号</p>
            <button id="login">去登录</button>
        </div>
        <div class="con-box right">
           <h2>欢迎来到<span>闲云野鹤</span></h2>
            <p>快来开启<span>手工之旅</span>吧</p>
            <img src="img/登录2.png" alt="">
            <p>没有账号？</p>
            <button id="register">去注册</button>
        </div>
    </div>
    <script>
        // 要操作到的元素
        let login=document.getElementById('login');
        let register=document.getElementById('register');
        let form_box=document.getElementsByClassName('form-box')[0];
        let register_box=document.getElementsByClassName('register-box')[0];
        let login_box=document.getElementsByClassName('login-box')[0];
        // 去注册按钮点击事件
        register.addEventListener('click',()=>{
            form_box.style.transform='translateX(80%)';
            login_box.classList.add('hidden');
            register_box.classList.remove('hidden');
        })
        // 去登录按钮点击事件
        login.addEventListener('click',()=>{
            form_box.style.transform='translateX(0%)';
            register_box.classList.add('hidden');
            login_box.classList.remove('hidden');
        })

    </script>
    
</body>

</html>
